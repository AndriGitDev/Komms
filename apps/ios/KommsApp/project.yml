# XcodeGen spec for the iOS shell — the .xcodeproj is generated, never
# committed. Prerequisites (macOS):
#   ../scripts/build-xcframework.sh   # Rust static libs → KultFFI.xcframework
#   xcodegen generate                 # this file → KommsApp.xcodeproj
name: KommsApp
options:
  bundleIdPrefix: is.andri
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  KommsCore:
    path: ../KommsCore

targets:
  KommsApp:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: KommsCore
      # Symbols for the kult_ffiFFI module (the module map itself lives in
      # the KommsCore package): Rust static libraries per platform.
      - framework: ../KultFFI.xcframework
        embed: false
      # libp2p's interface watcher (system_configuration / if_watch crates)
      # references SystemConfiguration; the app must link the system framework
      # that provides those SC*/kSC* symbols.
      - sdk: SystemConfiguration.framework
      - sdk: AVFoundation.framework
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Komms
        # Track the workspace/desktop/Android 0.2.0 family; Apple version
        # strings cannot carry a -alpha suffix.
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "2"
        UILaunchScreen: {}
        NSCameraUsageDescription: >-
          Komms uses the camera to scan a friend's pairing QR code or a
          safety-number QR during verification.
        NSLocalNetworkUsageDescription: >-
          Komms discovers peers on your local network (mDNS) so messages can
          be delivered LAN-only, with no internet at all.
        NSMicrophoneUsageDescription: >-
          Komms uses the microphone only while you explicitly record an audio
          message or place or answer an authenticated live audio call.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: is.andri.komms
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
