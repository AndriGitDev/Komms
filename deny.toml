# cargo-deny configuration — spec §11 obligation 5 and
# docs/09-implementation-guide.md §1. CI fails on violations.

[graph]
all-features = true

[licenses]
allow = [
    "AGPL-3.0-only",       # this workspace
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    # The official Meshtastic Rust client (M4 mesh carrier). GPL-3.0 and
    # AGPL-3.0 are mutually compatible via their respective §13 clauses.
    "GPL-3.0",
    # serialport (via meshtastic → tokio-serial). File-level copyleft,
    # GPL-compatible per MPL-2.0 §3.3.
    "MPL-2.0",
]

[advisories]
yanked = "deny"
ignore = [
    # Compile-time proc-macro, archived by its author with no successor risk;
    # pulled in by if-watch (libp2p QUIC/TCP). Not a vulnerability.
    { id = "RUSTSEC-2024-0436", reason = "paste is an unmaintained build-time proc-macro, not a runtime dependency" },
    # yamux 0.12.1 remote-panic DoS (CVE-2026-32314): a Data|SYN frame with
    # body > DEFAULT_CREDIT panics the connection state machine. Patched only
    # on the 0.13 line (0.13.10, which this tree also carries and actually
    # runs). libp2p-yamux ≤ 0.47 hard-depends on both yamux 0.12 and 0.13;
    # the 0.12 implementation is selected exclusively by the deprecated
    # local set_window_update_mode() API, which this workspace never calls —
    # every muxer here is built from yamux::Config::default(), i.e. the
    # patched 0.13.10 code, and a remote peer cannot negotiate the legacy
    # implementation. Delete this waiver when libp2p-yamux drops yamux 0.12.
    { id = "GHSA-vxx9-2994-q338", reason = "vulnerable legacy yamux 0.12 codepath is unreachable: default config pins the patched 0.13.10 implementation and the selection is local-only" },
]

[bans]
multiple-versions = "warn"
# Deny wildcard *registry* deps; workspace path deps carry no version by design.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# No git dependencies, period (docs/09-implementation-guide.md §1).
allow-git = []
