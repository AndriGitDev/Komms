name: kultd container

on:
  workflow_call:
    inputs:
      push:
        description: Push the qualified image to GHCR
        required: true
        type: boolean
      release_tag:
        description: Existing vMAJOR.MINOR.PATCH source tag
        required: false
        default: ""
        type: string

env:
  IMAGE_NAME: ghcr.io/andrigitdev/komms-kultd

jobs:
  build:
    name: ${{ inputs.push && 'publish multi-arch image' || 'build image' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag || github.sha }}
      - name: Record the image source revision
        id: source
        run: echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        if: inputs.push
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=semver,pattern={{version}},value=${{ inputs.release_tag }},enable=${{ inputs.push }}
            type=raw,value=0.1-alpha,enable=${{ inputs.push && inputs.release_tag == 'v0.1.0' }}
            type=raw,value=alpha,enable=${{ inputs.push && inputs.release_tag == 'v0.1.0' }}
          labels: |
            org.opencontainers.image.title=Komms kultd
            org.opencontainers.image.description=Self-hosted Komms headless node
            org.opencontainers.image.licenses=AGPL-3.0-only
            org.opencontainers.image.revision=${{ steps.source.outputs.revision }}
      - name: Build and optionally publish
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ inputs.push && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
