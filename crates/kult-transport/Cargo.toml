[package]
name = "kult-transport"
description = "KommsKult transport layer: the Transport trait every carrier implements, and the sneakernet (spool-directory) transport. Spec: docs/05-transports.md"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
kult-protocol = { version = "0.1.0", path = "../kult-protocol" }
async-trait = "0.1"
tokio = { version = "1", features = ["fs", "sync"] }

[dev-dependencies]
tokio = { version = "1", features = ["fs", "sync", "rt", "macros"] }
tempfile = "3"
