name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: fmt, clippy, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features
      - name: tests
        run: cargo test --workspace --all-features
      - name: no_std build (kult-crypto)
        run: cargo build -p kult-crypto --no-default-features

  desktop:
    name: desktop app (fmt, clippy, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: system dependencies (Tauri on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
        working-directory: .
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features
      - name: tests
        run: cargo test --all-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
      - name: desktop app workspace
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: apps/desktop/src-tauri/Cargo.toml

  fuzz-smoke:
    name: fuzz smoke (60s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/kult-crypto/fuzz
      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: fuzz kult-crypto targets
        working-directory: crates/kult-crypto
        run: |
          for t in envelope_decode handshake_decode bundle_decode mnemonic_decode; do
            cargo +nightly fuzz run "$t" -- -max_total_time=60
          done
      - name: fuzz kult-protocol targets
        working-directory: crates/kult-protocol
        run: |
          for t in protocol_envelope_decode bundle_import reassembler_insert; do
            cargo +nightly fuzz run "$t" -- -max_total_time=60
          done

  android-core:
    name: android core (bindings + JVM e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
      - name: build and test :core (generated bindings + two-node e2e, no Android SDK)
        run: gradle :core:build -Pkomms.androidApp=false

  ios-core:
    name: ios core (bindings + Swift e2e)
    runs-on: ubuntu-latest
    # Official Swift toolchain image; Rust goes in via rustup. The job runs
    # KommsCore's tests — including the two-node e2e — against the
    # host-built libkult_ffi, no Xcode or simulator involved.
    container: swift:6.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - name: generate bindings and run KommsCore tests (two-node e2e)
        run: apps/ios/scripts/test-core.sh

  # macOS runners are billed 10x on private repos, so the simulator build of
  # the SwiftUI shell is armed explicitly: set the repository variable
  # IOS_APP_CI=1 to enable it. The behavior layer is still covered on every
  # push by the Linux ios-core job above.
  ios-app:
    name: ios app (simulator build)
    if: vars.IOS_APP_CI == '1'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - uses: Swatinem/rust-cache@v2
      - name: install xcodegen
        run: brew install xcodegen
      - name: assemble KultFFI.xcframework (Rust static libs per platform)
        run: apps/ios/scripts/build-xcframework.sh
      - name: generate project and build for the simulator
        working-directory: apps/ios/KommsApp
        run: |
          xcodegen generate
          xcodebuild -project KommsApp.xcodeproj -scheme KommsApp \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build

  android-app:
    name: android app (assembleDebug)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-ndk
        run: cargo install cargo-ndk --locked
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
      - name: assemble debug APK (cross-compiles kult-ffi via cargo-ndk)
        run: gradle :app:assembleDebug -Pkomms.androidApp=true
      - name: upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: komms-android-debug
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
