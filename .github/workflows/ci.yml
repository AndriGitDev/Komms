name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: fmt, clippy, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets
      - name: tests
        run: cargo test --workspace
      - name: no_std build (kult-crypto)
        run: cargo build -p kult-crypto --no-default-features

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  fuzz-smoke:
    name: fuzz smoke (60s per target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/kult-crypto/fuzz
      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: fuzz each target briefly
        working-directory: crates/kult-crypto
        run: |
          for t in envelope_decode handshake_decode bundle_decode; do
            cargo +nightly fuzz run "$t" -- -max_total_time=60
          done
